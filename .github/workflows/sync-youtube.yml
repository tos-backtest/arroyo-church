name: Sync YouTube sermons + podcasts

on:
  schedule:
    - cron: '0 15 * * *'        # daily ~07:00–08:00 America/Los_Angeles
  workflow_dispatch:            # allow manual runs from the Actions tab

permissions:
  contents: write              # needed to commit refreshed data/*.json

concurrency:
  group: sync-youtube
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest sermons + podcasts
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}   # optional; RSS is used if absent
        run: node scripts/sync-youtube.mjs

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sermons.json data/podcasts.json
          if git diff --staged --quiet; then
            echo "No changes — sermons/podcasts already current."
          else
            git commit -m "Auto-sync sermons + podcasts from YouTube"
            git push
          fi
