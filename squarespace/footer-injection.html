<script>
(function(){
  var fine=matchMedia('(pointer:fine)').matches, reduce=matchMedia('(prefers-reduced-motion:reduce)').matches;
  var HOME=function(){ return document.body.classList.contains('homepage'); };

  /* ---- custom cursor ---- */
  if(fine&&!reduce){
    var dot=document.createElement('div');dot.id='ac-cur-dot';
    var ring=document.createElement('div');ring.id='ac-cur-ring';
    document.body.appendChild(dot);document.body.appendChild(ring);
    var x=-100,y=-100,rx=-100,ry=-100;
    addEventListener('mousemove',function(e){x=e.clientX;y=e.clientY;},{passive:true});
    (function loop(){rx+=(x-rx)*.16;ry+=(y-ry)*.16;
      dot.style.transform='translate('+(x-3.5)+'px,'+(y-3.5)+'px)';

    var sel='a,button,.sqs-block-button-element,.ac-btn,input,textarea,.header-nav-item';
    addEventListener('mouseover',function(e){if(e.target.closest&&e.target.closest(sel))ring.classList.add('on');});
    addEventListener('mouseout',function(e){if(e.target.closest&&e.target.closest(sel))ring.classList.remove('on');});
  }

  /* ---- hero particle overlay (video-bg hero, homepage) ---- */
  if(!reduce){
    function P(){
      if(!HOME())return;
      var bg=null, secs=document.querySelectorAll('.page-section .section-background');
      for(var i=0;i<secs.length;i++){ if(secs[i].querySelector('video')){ bg=secs[i]; break; } }
      if(!bg) return;
      if(getComputedStyle(bg).position==='static') bg.style.position='relative';
      if(bg.querySelector('#ac-particles')) return;

      var ctx=c.getContext('2d'),W,H,ps=[],t=0,dpr=Math.min(devicePixelRatio||1,2);

      function ini(){sz();var n=Math.min(120,Math.floor(W*H/24000));ps=[];for(var i=0;i<n;i++)ps.push({x:Math.random()*W,y:Math.random()*H,r:.8+Math.random()*2.2,s:.25+Math.random()*.7,p:Math.random()*6.28,g:Math.random()<.22});}
      function fr(){t+=.004;ctx.clearRect(0,0,W,H);for(var i=0;i<ps.length;i++){var p=ps[i];p.x+=p.s*(1+.5*Math.sin(t+p.p));p.y+=Math.sin(t*2+p.p+p.x*.002)*.35;if(p.x>W+10)p.x=-10;if(p.y>H+10)p.y=-10;if(p.y<-10)p.y=H+10;var a=.28+.22*Math.sin(t*3+p.p);ctx.beginPath();ctx.arc(p.x,p.y,p.r*dpr,0,6.28);ctx.fillStyle=p.g?'rgba(227,189,106,'+(a*.85)+')':'rgba(120,210,228,'+a+')';ctx.fill();}requestAnimationFrame(fr);}
      ini();fr();addEventListener('resize',ini,{passive:true});
    }
    if(document.readyState!=='loading')setTimeout(P,500);else addEventListener('DOMContentLoaded',function(){setTimeout(P,500);});
  }

  /* ---- M1: build the hero overlay (homepage only) ---- */
  function buildHero(){
    if(!HOME()) return;
    var hero=document.querySelector('[data-section-id="68533fde9bfaa374d9c67d61"]');
    if(!hero) return;
    if(hero.querySelector('.ac-hero')) return;
    var ov=document.createElement('div'); ov.className='ac-hero';
    ov.innerHTML =
      '<p class="ac-eyebrow">Arroyo Church &middot; Livermore, CA</p>'+
      '<h1>A river in the <em>desert.</em></h1>'+
      '<p class="ac-sub">Know and show the love of Jesus in the Bay Area and beyond. Wherever you are on your journey, you are welcome here.</p>'+
      '<div class="ac-ctas"><a class="ac-btn ac-btn-gold" href="/plan-your-visit">Plan Your Visit</a>'+
      '<a class="ac-btn ac-btn-ghost" href="/messages">Watch a Sermon</a></div>'+
      '<div class="ac-service"><strong>Sundays &middot; 10:00 AM</strong> &middot; 945 Concannon Blvd, Livermore, CA 94550</div>'+
      '<div class="ac-scroll"><span>Scroll</span><i></i></div>';
    hero.appendChild(ov);
    document.documentElement.classList.add('ac-hero-on'); /* only after overlay exists, so a failure never leaves a broken nav */
  }
  /* ---- M2: build the countdown strip right after the hero (homepage only) ---- */
  function buildCountdown(){
    if(!HOME()) return;
    var hero=document.querySelector('[data-section-id="68533fde9bfaa374d9c67d61"]');
    if(!hero || document.getElementById('ac-cd')) return;
    var sec=document.createElement('div'); sec.className='ac-cd'; sec.id='ac-cd';
    sec.setAttribute('role','timer'); sec.setAttribute('aria-label','Time until the next worship gathering');
    sec.innerHTML=
      '<span class="cd-label">Next worship gathering</span>'+
      '<div class="cd-units" id="ac-cd-units">'+
        '<div class="cd-unit"><div class="cd-num" id="ac-cd-d">&ndash;</div><div class="cd-word">Days</div></div>'+
        '<div class="cd-unit"><div class="cd-num" id="ac-cd-h">&ndash;</div><div class="cd-word">Hours</div></div>'+
        '<div class="cd-unit"><div class="cd-num" id="ac-cd-m">&ndash;</div><div class="cd-word">Minutes</div></div>'+
        '<div class="cd-unit"><div class="cd-num" id="ac-cd-s">&ndash;</div><div class="cd-word">Seconds</div></div>'+
      '</div>'+
      '<div class="cd-live" id="ac-cd-live">We&rsquo;re gathered right now &mdash; come join us!</div>'+
      '<span class="cd-where">Sundays <strong>10:00 AM</strong> &middot; the round building at <strong>945 Concannon Blvd</strong></span>';
    hero.parentNode.insertBefore(sec, hero.nextSibling);
    startCountdown();
  }
  function startCountdown(){
    var d=document.getElementById('ac-cd-d'),h=document.getElementById('ac-cd-h'),
        m=document.getElementById('ac-cd-m'),s=document.getElementById('ac-cd-s'),
        units=document.getElementById('ac-cd-units'),live=document.getElementById('ac-cd-live');
    if(!d) return;
    var laFmt=new Intl.DateTimeFormat('en-US',{timeZone:'America/Los_Angeles',weekday:'short',hour:'numeric',minute:'numeric',second:'numeric',hour12:false});
    function laPartsAt(date){var p=laFmt.formatToParts(date);function g(t){return p.find(function(x){return x.type===t;}).value;}return {wd:g('weekday'),h:(+g('hour'))%24,mi:+g('minute'),s:+g('second')};}
    function tick(){
      var la=laPartsAt(new Date());
      var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],dow=days.indexOf(la.wd);
      var secNow=la.h*3600+la.mi*60+la.s,tenAM=10*3600,elevenAM=11*3600;
      if(dow===0&&secNow>=tenAM&&secNow<elevenAM){units.style.display='none';live.style.display='block';return;}
      units.style.display='';live.style.display='none';
      var daysAhead; if(dow===0&&secNow<tenAM)daysAhead=0;else daysAhead=(7-dow)%7||7;
      var total=daysAhead*86400+tenAM-secNow; if(total<0)total+=7*86400;
      var probe=laPartsAt(new Date(Date.now()+total*1000));
      var drift=tenAM-(probe.h*3600+probe.mi*60+probe.s);
      if(drift!==0&&Math.abs(drift)<=7200)total+=drift;
      d.textContent=Math.floor(total/86400);
      h.textContent=String(Math.floor(total%86400/3600)).padStart(2,'0');
      m.textContent=String(Math.floor(total%3600/60)).padStart(2,'0');
      s.textContent=String(total%60).padStart(2,'0');
    }
    tick(); setInterval(tick,1000);
  }
  /* ---- nav: the leftover empty "About" folder -> real link to /about, kill its empty dropdown ---- */
  function fixAboutNav(){
    var items=document.querySelectorAll('.header-nav-item');
    for(var i=0;i<items.length;i++){
      var it=items[i], title=it.querySelector('.header-nav-folder-title');
      if(!title || (title.textContent||'').trim()!=='About') continue;
      if(it.querySelectorAll('.header-nav-folder-content a, .header-nav-folder-item a').length>0) continue; /* a real (non-empty) folder: leave alone */
      var content=it.querySelector('.header-nav-folder-content'); if(content) content.style.display='none';
      if(!title.getAttribute('data-ac-about')){
        title.setAttribute('data-ac-about','1'); title.style.cursor='pointer';
        title.addEventListener('click',function(e){ e.preventDefault(); window.location.href='/about'; });
      }
    }
  }
  /* ---- M3: build the mission section right after the countdown (homepage only) ---- */
  function buildMission(){
    if(!HOME()) return;
    var cd=document.getElementById('ac-cd');
    var anchor=cd || document.querySelector('[data-section-id="68533fde9bfaa374d9c67d61"]');
    if(!anchor || document.getElementById('ac-mission')) return;
    var sec=document.createElement('section'); sec.className='ac-mission'; sec.id='ac-mission';
    sec.innerHTML=
      '<div class="wrap"><div class="ms-grid">'+
        '<div class="ms-copy">'+
          '<p class="eyebrow ac-rev">Who we are</p>'+
          '<h2 class="ac-rev" style="--d:.08s">We exist to <em>know</em> and <em>show</em> the love of Jesus in the Bay Area and beyond.</h2>'+
          '<p class="lead ac-rev" style="--d:.16s">Love is not a feeling, but a sacrificial action done for the benefit of another. The most powerful demonstration of love in the history of humanity is when Jesus died on the cross in our place for our sins.</p>'+
          '<p class="verse ac-rev" style="--d:.22s"><em>&ldquo;This is love, not that we loved God but that God loved us by sending His Son as the atoning sacrifice for our sins.&rdquo; &mdash; 1 John 4:10</em></p>'+
        '</div>'+
        '<div class="ms-cards">'+
          '<div class="mcard ac-rev" style="--d:.05s"><div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 21C12 21 4 14.5 4 9.5C4 6.5 6.5 4 9.5 4C10.9 4 12 4.8 12 4.8C12 4.8 13.1 4 14.5 4C17.5 4 20 6.5 20 9.5C20 14.5 12 21 12 21Z"/></svg></div><div><h3>The Love of Jesus</h3><p>The cross is the most powerful demonstration of love in history &mdash; Jesus died in our place, for our sins.</p></div></div>'+
          '<div class="mcard ac-rev" style="--d:.12s"><div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2.5"/></svg></div><div><h3>Knowing</h3><p>Jesus does not want you to merely know about His love intellectually but to experience His love personally.</p></div></div>'+
          '<div class="mcard ac-rev" style="--d:.19s"><div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M7 11L12 6L17 11M12 7V18"/><path d="M5 21H19"/></svg></div><div><h3>Showing</h3><p>We seek to love others with both our words and works, just like Jesus.</p></div></div>'+
          '<div class="mcard ac-rev" style="--d:.26s"><div class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 2.6 4 5.7 4 9s-1.5 6.4-4 9c-2.5-2.6-4-5.7-4-9s1.5-6.4 4-9z"/></svg></div><div><h3>The Bay Area &amp; Beyond</h3><p>We are rooted in Livermore and reach people all over the Bay Area &mdash; with a heart for reaching the nations too.</p></div></div>'+
        '</div>'+
      '</div></div>';
    anchor.parentNode.insertBefore(sec, anchor.nextSibling);
  }
  /* ---- M4: build the "Why Arroyo" story + river animation (homepage only) ---- */
  function buildStory(){
    if(!HOME()) return;
    var anchor=document.getElementById('ac-mission') || document.getElementById('ac-cd');
    if(!anchor || document.getElementById('ac-story')) return;
    var sec=document.createElement('section'); sec.className='ac-story'; sec.id='ac-story';
    sec.setAttribute('aria-label','Why the church is named Arroyo');
    sec.innerHTML=
      '<div class="story-inner">'+
        '<svg id="ac-river-svg" viewBox="0 0 120 900" width="120" height="900" preserveAspectRatio="xMidYMin meet" aria-hidden="true">'+
          '<defs><linearGradient id="acRiverGrad" x1="0" y1="0" x2="0" y2="1">'+
            '<stop offset="0" stop-color="#c89a3e" stop-opacity=".0"/>'+
            '<stop offset=".25" stop-color="#c89a3e" stop-opacity=".55"/>'+
            '<stop offset=".6" stop-color="#5fc2d4"/>'+
            '<stop offset="1" stop-color="#bfe7ee"/>'+
          '</linearGradient></defs>'+
          '<path id="ac-river-path" d="M60,0 C30,90 92,160 60,250 C30,335 88,400 60,490 C34,572 90,640 62,730 C40,800 76,850 60,900" stroke="url(#acRiverGrad)" stroke-width="3.5" fill="none"/>'+
        '</svg>'+
        '<div class="story-z">'+
          '<p class="story-kicker ac-rev">Why is the church named Arroyo?</p>'+
          '<blockquote class="story-verse" id="ac-verse">&ldquo;Remember not the former things, nor consider the things of old. Behold, I am doing a new thing; now it springs forth, do you not perceive it? I will make a way in the wilderness and rivers in the desert.&rdquo;</blockquote>'+
          '<p class="story-ref ac-rev">&mdash; Isaiah 43:18&ndash;19</p>'+
          '<p class="story-body ac-rev">An <strong>arroyo</strong> is a river in the desert. The Bay Area in many ways is a spiritual desert &mdash; it is the most unchurched area in the United States. We believe that God has called our church to be a river in the middle of this spiritual desert. <strong>We bring life into the desert by knowing and showing the love of Jesus to the Bay Area and beyond.</strong></p>'+
          '<div class="story-stat ac-rev" style="--d:.1s"><span class="big">Life flows where the <em>river</em> runs.</span><span class="small">A church rooted in Livermore, bringing living water to the most unchurched region in America.</span></div>'+
        '</div>'+
      '</div>';
    anchor.parentNode.insertBefore(sec, anchor.nextSibling);
    initStoryAnim();
  }
  function initStoryAnim(){
    var story=document.getElementById('ac-story'), path=document.getElementById('ac-river-path'), verseEl=document.getElementById('ac-verse');
    if(!story) return;
    var pathLen=0;
    if(path){ try{ pathLen=path.getTotalLength(); }catch(e){ pathLen=0; } path.style.strokeDasharray=pathLen; path.style.strokeDashoffset=pathLen; }
    var verseWords=[];
    if(verseEl){ var words=verseEl.textContent.trim().split(/\s+/); verseEl.innerHTML=words.map(function(w){return '<span class="vw">'+w+'</span>';}).join(' '); verseWords=[].slice.call(verseEl.querySelectorAll('.vw')); }
    if(reduce){ if(path) path.style.strokeDashoffset=0; verseWords.forEach(function(w){w.classList.add('lit');}); return; }
    var ticking=false;
    function upd(){
      ticking=false;
      var r=story.getBoundingClientRect(), vh=window.innerHeight;
      var t=Math.min(1,Math.max(0,(vh*0.75 - r.top)/(r.height*0.85)));
      if(path) path.style.strokeDashoffset=pathLen*(1-t);
      if(verseWords.length){ var lit=Math.floor(Math.min(1,t*2.6)*verseWords.length); for(var i=0;i<verseWords.length;i++){ verseWords[i].classList.toggle('lit', i<lit); } }
    }
    function onScr(){ if(ticking) return; ticking=true; requestAnimationFrame(upd); }
    addEventListener('scroll',onScr,{passive:true}); addEventListener('resize',onScr,{passive:true}); upd();
  }
  function acInitSections(){ buildHero(); buildCountdown(); buildMission(); buildStory(); fixAboutNav(); }
  if(document.readyState!=='loading')acInitSections();else addEventListener('DOMContentLoaded',acInitSections);
  setTimeout(fixAboutNav,800); setTimeout(fixAboutNav,2200);

  /* ---- nav solid-on-scroll ---- */
  function navScroll(){ document.documentElement.classList.toggle('ac-scrolled', (window.scrollY||0)>40); }
  addEventListener('scroll',navScroll,{passive:true}); navScroll();

  /* ---- safe scroll-reveal ---- */
  if(!reduce && 'IntersectionObserver' in window){
    document.documentElement.classList.add('ac-anim');
    function reveal(){
      var io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('ac-in');io.unobserve(e.target);}});},{threshold:.12,rootMargin:'0px 0px -6% 0px'});
      document.querySelectorAll('.fe-block,.ac-rev').forEach(function(el){io.observe(el);});
      setTimeout(function(){document.documentElement.classList.add('ac-reveal-all');},1600);
    }
    if(document.readyState!=='loading')reveal();else addEventListener('DOMContentLoaded',reveal);
    setTimeout(function(){document.documentElement.classList.add('ac-reveal-all');},3000);
  }
})();
</script>
